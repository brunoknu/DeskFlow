services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-Dev@Passw0rd!}"
    ports:
      - "1433:1433"
    volumes:
      - db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${DB_PASSWORD:-Dev@Passw0rd!}\" -Q \"SELECT 1\" -No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mailpit:
    image: axllent/mailpit:v1.22
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: src/DeskFlow.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=db;Database=DeskFlowDev;User Id=sa;Password=${DB_PASSWORD:-Dev@Passw0rd!};TrustServerCertificate=True;"
      Email__Host: mailpit
      Email__Port: 1025
      Email__From: noreply@deskflow.local
      AllowedOrigins__0: http://localhost:5173
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

volumes:
  db-data:
